<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | База данных</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; position: relative; }
        .header h1 { font-size: 1.8em; }
        .admin-panel { position: absolute; top: 20px; right: 20px; }
        .admin-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        .admin-form { background: white; padding: 20px; border-radius: 12px; margin-top: 10px; display: none; position: absolute; right: 0; width: 280px; z-index: 100; }
        .admin-form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .admin-form button { background: #667eea; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
        .content { padding: 30px; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select { flex: 1; min-width: 150px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #667eea; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f5f5; }
        .status-bar { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; justify-content: space-between; }
        .product-count { background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; }
        .actions { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-success { background: #10b981; color: white; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 3px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 6px; } .filter-bar select { font-size: 12px; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 500px; max-width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .modal-buttons button:first-child { background: #667eea; color: white; }
        .modal-buttons button:last-child { background: #ef4444; color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
        <div class="admin-panel">
            <button class="admin-toggle" onclick="toggleAdminPanel()">🔒 Админ-панель</button>
            <div class="admin-form" id="adminForm">
                <h3>🔐 Вход для администратора</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button onclick="loginAdmin()">Войти</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="filter-bar">
            <select id="categoryFilter" onchange="filterData()">
                <option value="">📁 Все категории</option>
                <option value="Протеины">🥛 Протеины</option>
                <option value="Креатин">⚡ Креатин</option>
                <option value="BCAA">🔗 BCAA / Аминокислоты</option>
                <option value="L-Карнитин">🔥 L-Карнитин</option>
                <option value="Гейнеры">⚖️ Гейнеры</option>
            </select>
            <select id="typeFilter" onchange="filterData()">
                <option value="">📋 Все типы</option>
            </select>
            <select id="brandFilter" onchange="filterData()">
                <option value="">🏷️ Все бренды</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead id="tableHeaders">
                    <tr><th>Название</th><th>Категория</th><th>Тип</th><th>Бренд</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белок</th><th>Рейтинг</th><th>Действия</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="status-bar">
            <span id="statusText">🔄 Загрузка данных...</span>
            <div class="product-count" id="productCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="showAddForm()">➕ Добавить продукт</button>
            <button class="btn btn-success" onclick="loadProducts()">🔄 Обновить</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ НОВЫЙ ПРОДУКТ</h3>
        <input type="text" id="newName" placeholder="Название *">
        <select id="newCategory">
            <option value="Протеины">🥛 Протеины</option>
            <option value="Креатин">⚡ Креатин</option>
            <option value="BCAA">🔗 BCAA / Аминокислоты</option>
            <option value="L-Карнитин">🔥 L-Карнитин</option>
            <option value="Гейнеры">⚖️ Гейнеры</option>
        </select>
        <input type="text" id="newType" placeholder="Тип (Сывороточный, Моногидрат...)">
        <input type="text" id="newBrand" placeholder="Бренд">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="newWeight" placeholder="Вес (г)" style="flex:1">
            <input type="number" id="newPrice" placeholder="Цена (₽)" style="flex:1">
        </div>
        <input type="number" id="newProtein" placeholder="Белок на 100г">
        <select id="newRating">
            <option value="5">⭐⭐⭐⭐⭐ Отлично</option>
            <option value="4">⭐⭐⭐⭐ Хорошо</option>
            <option value="3">⭐⭐⭐ Средне</option>
            <option value="2">⭐⭐ Плохо</option>
            <option value="1">⭐ Ужасно</option>
        </select>
        <div class="modal-buttons">
            <button onclick="addProduct()">💾 СОХРАНИТЬ</button>
            <button onclick="closeModal()">❌ ОТМЕНА</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://gfegddnmqtwamxlmxqba.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_secret_ngxwGfdugdYfHnUxwIvZMg_WENVULVr";  
    
    let supabase;
    let isAdmin = false;
    let allProducts = [];
    
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
        document.getElementById('statusText').innerHTML = '❌ Ошибка подключения';
    }
    
    async function loadProducts() {
        if (!supabase) return;
        const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
        if (error) {
            document.getElementById('statusText').innerHTML = '❌ Ошибка: ' + error.message;
        } else {
            allProducts = data;
            updateFilters();
            displayProducts(data);
            document.getElementById('statusText').innerHTML = `✅ ${data.length} продуктов`;
            document.getElementById('productCount').textContent = data.length;
        }
    }
    
    function updateFilters() {
        const types = new Set();
        const brands = new Set();
        allProducts.forEach(p => { if(p.type) types.add(p.type); if(p.brand) brands.add(p.brand); });
        
        const typeSelect = document.getElementById('typeFilter');
        typeSelect.innerHTML = '<option value="">📋 Все типы</option>';
        Array.from(types).sort().forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);
        
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">🏷️ Все бренды</option>';
        Array.from(brands).sort().forEach(b => brandSelect.innerHTML += `<option value="${b}">${b}</option>`);
    }
    
    function filterData() {
        let filtered = allProducts;
        const category = document.getElementById('categoryFilter').value;
        const type = document.getElementById('typeFilter').value;
        const brand = document.getElementById('brandFilter').value;
        if (category) filtered = filtered.filter(p => p.category === category);
        if (type) filtered = filtered.filter(p => p.type === type);
        if (brand) filtered = filtered.filter(p => p.brand === brand);
        displayProducts(filtered);
        document.getElementById('productCount').textContent = filtered.length;
    }
    
    function displayProducts(products) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px;">📭 Нет продуктов</td></tr>';
            return;
        }
        products.forEach(p => {
            tbody.innerHTML += `<tr>
                <td>${p.name || ''}</td>
                <td>${p.category || ''}</td>
                <td>${p.type || ''}</td>
                <td>${p.brand || ''}</td>
                <td>${p.weight || ''}</td>
                <td>${p.price || ''}</td>
                <td>${p.protein || ''}</td>
                <td>${'⭐'.repeat(p.rating || 5)}</td>
                <td>${isAdmin ? `<button class="edit-btn" onclick="editProduct(${p.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button>` : ''}</td>
            </tr>`;
        });
    }
    
    function toggleAdminPanel() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }
    
    function loginAdmin() {
        const password = document.getElementById('adminPassword').value;
        if (password === "admin123") {
            isAdmin = true;
            alert("✅ Вы вошли как администратор");
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('addBtn').style.display = 'inline-block';
            loadProducts();
        } else {
            alert("❌ Неверный пароль");
        }
    }
    
    function showAddForm() {
        document.getElementById('addModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
    }
    
    async function addProduct() {
        if (!isAdmin) return;
        const product = {
            name: document.getElementById('newName').value,
            category: document.getElementById('newCategory').value,
            type: document.getElementById('newType').value,
            brand: document.getElementById('newBrand').value,
            weight: parseInt(document.getElementById('newWeight').value) || 0,
            price: parseInt(document.getElementById('newPrice').value) || 0,
            protein: parseInt(document.getElementById('newProtein').value) || 0,
            rating: parseInt(document.getElementById('newRating').value)
        };
        if (!product.name) { alert("Введите название"); return; }
        const { error } = await supabase.from('products').insert([product]);
        if (error) { alert("Ошибка: " + error.message); }
        else { alert("✅ Добавлено!"); closeModal(); loadProducts(); }
    }
    
    async function deleteProduct(id) {
        if (!isAdmin) return;
        if (!confirm("Удалить?")) return;
        const { error } = await supabase.from('products').delete().eq('id', id);
        if (error) alert("Ошибка: " + error.message);
        else { alert("✅ Удалено"); loadProducts(); }
    }
    
    async function editProduct(id) {
        if (!isAdmin) return;
        const newName = prompt("Новое название:");
        if (!newName) return;
        const { error } = await supabase.from('products').update({ name: newName }).eq('id', id);
        if (error) alert("Ошибка: " + error.message);
        else { alert("✅ Изменено"); loadProducts(); }
    }
    
    loadProducts();
</script>
</body>
</html>
