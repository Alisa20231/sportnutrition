<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | Общая база данных</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .admin-panel {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .admin-toggle {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .admin-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        
        .admin-form {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 10px;
            display: none;
            position: absolute;
            right: 0;
            width: 300px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .admin-form h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
            text-align: center;
        }
        
        .admin-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .admin-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .admin-form button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .admin-form button:hover {
            background: #5a67d8;
        }
        
        .content {
            padding: 30px;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-bar select {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            font-size: 14px;
        }
        
        .filter-bar select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px 10px;
            text-align: left;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .product-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .edit-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 5px 12px;
            margin: 0 3px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 12px;
            margin: 0 3px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .edit-btn:hover, .delete-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.2em; }
            .content { padding: 20px; }
            .btn { padding: 8px 16px; font-size: 12px; }
            th, td { font-size: 11px; padding: 6px; }
            .filter-bar select { font-size: 12px; min-width: 120px; }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 550px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
        }
        
        .form-row input {
            flex: 1;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        
        .modal-buttons button:first-child {
            background: #667eea;
            color: white;
        }
        
        .modal-buttons button:last-child {
            background: #ef4444;
            color: white;
        }
        
        .rating {
            color: #f59e0b;
        }
        
        .admin-badge {
            background: #10b981;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
        <div class="admin-panel">
            <button class="admin-toggle" id="adminToggleBtn">🔑 Админ-панель</button>
            <div class="admin-form" id="adminForm">
                <h3>🔐 Вход администратора</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button id="loginBtn">Войти</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="filter-bar">
            <select id="categoryFilter">
                <option value="">📁 Все категории</option>
                <option value="Протеины">🥛 Протеины</option>
                <option value="Креатин">⚡ Креатин</option>
                <option value="Аминокислоты">🔗 Аминокислоты</option>
                <option value="Жиросжигатели">🔥 Жиросжигатели</option>
                <option value="Гейнеры">⚖️ Гейнеры</option>
            </select>
            <select id="typeFilter">
                <option value="">📋 Все типы</option>
            </select>
            <select id="brandFilter">
                <option value="">🏷️ Все бренды</option>
            </select>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Название</th><th>Категория</th><th>Тип</th><th>Бренд</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белки</th><th>Жиры</th><th>Углеводы</th><th>Рейтинг</th><th id="actionsHeader">Действия</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" style="text-align:center; padding:40px;">🔄 Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="status-bar">
            <span id="statusText">Загрузка...</span>
            <div class="product-count" id="productCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="addBtn" style="display:none;">➕ Добавить продукт</button>
            <button class="btn btn-success" id="refreshBtn">🔄 Обновить</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ НОВЫЙ ПРОДУКТ</h3>
        <input type="text" id="newName" placeholder="Название продукта *">
        <select id="newCategory">
            <option value="Протеины">🥛 Протеины</option>
            <option value="Креатин">⚡ Креатин</option>
            <option value="Аминокислоты">🔗 Аминокислоты</option>
            <option value="Жиросжигатели">🔥 Жиросжигатели</option>
            <option value="Гейнеры">⚖️ Гейнеры</option>
        </select>
        <input type="text" id="newType" placeholder="Тип">
        <input type="text" id="newBrand" placeholder="Бренд">
        <div class="form-row">
            <input type="number" id="newWeight" placeholder="Вес (г)">
            <input type="number" id="newPrice" placeholder="Цена (₽)">
        </div>
        <div class="form-row">
            <input type="number" step="0.1" id="newProtein" placeholder="Белки /100г">
            <input type="number" step="0.1" id="newFats" placeholder="Жиры /100г">
            <input type="number" step="0.1" id="newCarbs" placeholder="Углеводы /100г">
        </div>
        <select id="newRating">
            <option value="5">⭐⭐⭐⭐⭐ Отлично</option>
            <option value="4">⭐⭐⭐⭐ Хорошо</option>
            <option value="3">⭐⭐⭐ Средне</option>
            <option value="2">⭐⭐ Плохо</option>
            <option value="1">⭐ Ужасно</option>
        </select>
        <div class="modal-buttons">
            <button id="saveProductBtn">💾 СОХРАНИТЬ</button>
            <button id="closeModalBtn">❌ ОТМЕНА</button>
        </div>
    </div>
</div>

<script>
    // ==================== SUPABASE НАСТРОЙКИ ====================
    // ЗАМЕНИТЕ ЭТИ ДАННЫЕ НА ВАШИ ИЗ SUPABASE!
    const SUPABASE_URL = "https://gfegddnmqtwamxlmxqba.supabase.co";      // ВАШ URL
    const SUPABASE_ANON_KEY = "sb_publishable_BQm4AqGZgqOQ5WLe26UR-g_BtES9KtI";                  // ВАШ КЛЮЧ
    
    // ==================== ПЕРЕМЕННЫЕ ====================
    let supabase;
    let isAdmin = false;
    let allProducts = [];
    
    // ==================== ПОДКЛЮЧЕНИЕ К SUPABASE ====================
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Supabase подключен");
        document.getElementById('statusText').innerHTML = '🔄 Подключение к Supabase...';
    } catch(e) {
        console.log("❌ Ошибка:", e);
        document.getElementById('statusText').innerHTML = '❌ Ошибка подключения к Supabase. Проверьте URL и ключ.';
    }
    
    // ==================== ЗАГРУЗКА ИЗ SUPABASE ====================
    async function loadProducts() {
        if (!supabase) return;
        
        document.getElementById('statusText').innerHTML = '🔄 Загрузка из Supabase...';
        
        const { data, error } = await supabase
            .from('products')
            .select('*')
            .order('id', { ascending: false });
        
        if (error) {
            console.log("❌ Ошибка загрузки:", error);
            document.getElementById('statusText').innerHTML = '❌ Ошибка: ' + error.message;
            // Пробуем загрузить из localStorage
            loadFromLocal();
        } else {
            allProducts = data || [];
            console.log("✅ Загружено из Supabase:", allProducts.length);
            updateFilters();
            displayProducts();
            document.getElementById('statusText').innerHTML = `✅ Загружено ${allProducts.length} продуктов из Supabase`;
            document.getElementById('productCount').textContent = allProducts.length;
        }
    }
    
    // ==================== РЕЗЕРВНОЕ ЛОКАЛЬНОЕ ХРАНИЛИЩЕ ====================
    function loadFromLocal() {
        const saved = localStorage.getItem('sportnutrition_products');
        if (saved) {
            allProducts = JSON.parse(saved);
            updateFilters();
            displayProducts();
            document.getElementById('statusText').innerHTML = `📀 Загружено ${allProducts.length} продуктов (локально)`;
            document.getElementById('productCount').textContent = allProducts.length;
        } else {
            // Стандартные данные
            allProducts = [
                { id: 1, name: "Impact Whey", category: "Протеины", type: "Сывороточный", brand: "MyProtein", weight: 1000, price: 3790, protein: 78, fats: 5.2, carbs: 5.5, rating: 5 },
                { id: 2, name: "Gold Standard", category: "Протеины", type: "Сывороточный", brand: "Optimum Nutrition", weight: 2270, price: 5490, protein: 82, fats: 2, carbs: 4, rating: 5 },
                { id: 3, name: "Creatine Monohydrate", category: "Креатин", type: "Моногидрат", brand: "MyProtein", weight: 500, price: 1190, protein: 0, fats: 0, carbs: 0, rating: 5 }
            ];
            saveToLocal();
            displayProducts();
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('sportnutrition_products', JSON.stringify(allProducts));
    }
    
    // ==================== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ====================
    function displayProducts() {
        const category = document.getElementById('categoryFilter').value;
        const type = document.getElementById('typeFilter').value;
        const brand = document.getElementById('brandFilter').value;
        
        let filtered = allProducts;
        if (category) filtered = filtered.filter(p => p.category === category);
        if (type) filtered = filtered.filter(p => p.type === type);
        if (brand) filtered = filtered.filter(p => p.brand === brand);
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:40px;">📭 Нет продуктов</td></tr>';
            document.getElementById('actionsHeader').style.display = 'none';
            document.getElementById('productCount').textContent = '0';
            return;
        }
        
        document.getElementById('actionsHeader').style.display = isAdmin ? 'table-cell' : 'none';
        
        filtered.forEach(product => {
            const ratingStars = '⭐'.repeat(product.rating || 5);
            const actions = isAdmin ? `<td><button class="edit-btn" onclick="editProduct(${product.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️</button></td>` : '<td></td>';
            
            tbody.innerHTML += `
                <tr>
                    <td>${product.name || ''}</td>
                    <td>${product.category || ''}</td>
                    <td>${product.type || ''}</td>
                    <td>${product.brand || ''}</td>
                    <td>${product.weight || 0} г</td>
                    <td>${product.price || 0} ₽</td>
                    <td>${product.protein || 0} г</td>
                    <td>${product.fats || 0} г</td>
                    <td>${product.carbs || 0} г</td>
                    <td class="rating">${ratingStars}</td>
                    ${actions}
                </tr>
            `;
        });
        
        document.getElementById('productCount').textContent = filtered.length;
    }
    
    // ==================== ФИЛЬТРЫ ====================
    function updateFilters() {
        const types = [...new Set(allProducts.map(p => p.type).filter(t => t))];
        const brands = [...new Set(allProducts.map(p => p.brand).filter(b => b))];
        
        const typeSelect = document.getElementById('typeFilter');
        typeSelect.innerHTML = '<option value="">📋 Все типы</option>';
        types.sort().forEach(t => {
            typeSelect.innerHTML += `<option value="${t}">${t}</option>`;
        });
        
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">🏷️ Все бренды</option>';
        brands.sort().forEach(b => {
            brandSelect.innerHTML += `<option value="${b}">${b}</option>`;
        });
    }
    
    function filterData() {
        displayProducts();
    }
    
    // ==================== АДМИН-ПАНЕЛЬ ====================
    function toggleAdminPanel() {
        const form = document.getElementById('adminForm');
        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
        } else {
            form.style.display = 'none';
        }
    }
    
    function loginAdmin() {
        const password = document.getElementById('adminPassword').value;
        
        if (password === "admin123") {
            isAdmin = true;
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('addBtn').style.display = 'inline-block';
            document.getElementById('adminPassword').value = '';
            displayProducts();
            document.getElementById('statusText').innerHTML = "✅ Режим администратора активен";
            alert("✅ Добро пожаловать! Теперь вы можете добавлять, редактировать и удалять продукты.");
        } else {
            alert("❌ Неверный пароль!");
            document.getElementById('adminPassword').value = '';
        }
    }
    
    // ==================== ДОБАВЛЕНИЕ В SUPABASE ====================
    async function addProductToSupabase(product) {
        if (!supabase) return false;
        
        const { data, error } = await supabase.from('products').insert([product]).select();
        
        if (error) {
            console.log("❌ Ошибка добавления в Supabase:", error);
            return false;
        }
        return true;
    }
    
    async function addProduct() {
        if (!isAdmin) {
            alert("❌ Только администратор может добавлять продукты");
            return;
        }
        
        const name = document.getElementById('newName').value.trim();
        if (!name) {
            alert("Введите название продукта!");
            return;
        }
        
        const newProduct = {
            name: name,
            category: document.getElementById('newCategory').value,
            type: document.getElementById('newType').value.trim() || "Не указан",
            brand: document.getElementById('newBrand').value.trim() || "Не указан",
            weight: parseInt(document.getElementById('newWeight').value) || 0,
            price: parseInt(document.getElementById('newPrice').value) || 0,
            protein: parseFloat(document.getElementById('newProtein').value) || 0,
            fats: parseFloat(document.getElementById('newFats').value) || 0,
            carbs: parseFloat(document.getElementById('newCarbs').value) || 0,
            rating: parseInt(document.getElementById('newRating').value)
        };
        
        document.getElementById('statusText').innerHTML = '💾 Сохранение в Supabase...';
        
        const success = await addProductToSupabase(newProduct);
        
        if (success) {
            alert("✅ Продукт добавлен в облачную базу данных!");
            closeModal();
            await loadProducts(); // Перезагружаем из Supabase
            clearForm();
        } else {
            alert("❌ Ошибка подключения к Supabase. Продукт сохранён локально.");
            newProduct.id = Date.now();
            allProducts.push(newProduct);
            saveToLocal();
            updateFilters();
            displayProducts();
            closeModal();
        }
    }
    
    function clearForm() {
        document.getElementById('newName').value = '';
        document.getElementById('newType').value = '';
        document.getElementById('newBrand').value = '';
        document.getElementById('newWeight').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newProtein').value = '';
        document.getElementById('newFats').value = '';
        document.getElementById('newCarbs').value = '';
    }
    
    // ==================== РЕДАКТИРОВАНИЕ ====================
    async function editProduct(id) {
        if (!isAdmin) return;
        
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        
        const newName = prompt("Введите новое название:", product.name);
        if (!newName || newName === product.name) return;
        
        if (supabase) {
            const { error } = await supabase.from('products').update({ name: newName }).eq('id', id);
            if (error) {
                alert("Ошибка: " + error.message);
            } else {
                alert("✅ Изменено в облаке!");
                await loadProducts();
            }
        } else {
            product.name = newName;
            saveToLocal();
            displayProducts();
            alert("✅ Изменено локально");
        }
    }
    
    // ==================== УДАЛЕНИЕ ====================
    async function deleteProduct(id) {
        if (!isAdmin) return;
        
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        
        if (!confirm(`❓ Удалить продукт "${product.name}"?`)) return;
        
        if (supabase) {
            const { error } = await supabase.from('products').delete().eq('id', id);
            if (error) {
                alert("Ошибка: " + error.message);
            } else {
                alert("✅ Удалено из облака!");
                await loadProducts();
            }
        } else {
            const index = allProducts.findIndex(p => p.id === id);
            allProducts.splice(index, 1);
            saveToLocal();
            updateFilters();
            displayProducts();
            alert("✅ Удалено локально");
        }
    }
    
    // ==================== МОДАЛЬНОЕ ОКНО ====================
    function showAddForm() {
        document.getElementById('addModal').style.display = 'flex';
        clearForm();
    }
    
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
    }
    
    function refreshData() {
        if (supabase) {
            loadProducts();
        } else {
            loadFromLocal();
        }
    }
    
    // ==================== ЭКСПОРТ В EXCEL ====================
    function exportToExcel() {
        let csv = "Название;Категория;Тип;Бренд;Вес(г);Цена(₽);Белки(г);Жиры(г);Углеводы(г);Рейтинг\n";
        allProducts.forEach(p => {
            csv += `${p.name};${p.category};${p.type};${p.brand};${p.weight};${p.price};${p.protein};${p.fats};${p.carbs};${p.rating}\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `sportnutrition_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link);
        alert("✅ Данные выгружены в CSV");
    }
    
    // ==================== НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ ====================
    document.getElementById('adminToggleBtn').onclick = toggleAdminPanel;
    document.getElementById('loginBtn').onclick = loginAdmin;
    document.getElementById('addBtn').onclick = showAddForm;
    document.getElementById('refreshBtn').onclick = refreshData;
    document.getElementById('saveProductBtn').onclick = addProduct;
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('categoryFilter').onchange = filterData;
    document.getElementById('typeFilter').onchange = filterData;
    document.getElementById('brandFilter').onchange = filterData;
    
    // Добавляем кнопку экспорта
    const actionsDiv = document.querySelector('.actions');
    const exportBtn = document.createElement('button');
    exportBtn.className = 'btn';
    exportBtn.innerHTML = '📊 Экспорт в Excel';
    exportBtn.style.background = '#f59e0b';
    exportBtn.style.color = 'white';
    exportBtn.onclick = exportToExcel;
    actionsDiv.appendChild(exportBtn);
    
    window.onclick = function(event) {
        const modal = document.getElementById('addModal');
        if (event.target === modal) closeModal();
    };
    
    // ==================== ЗАПУСК ====================
    if (supabase) {
        loadProducts();
    } else {
        loadFromLocal();
        document.getElementById('statusText').innerHTML = '⚠️ Supabase не настроен. Данные хранятся локально.';
    }
</script>
</body>
</html>
