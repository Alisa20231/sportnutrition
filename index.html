<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | База данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .admin-panel {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .admin-toggle {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .admin-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .admin-form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            position: absolute;
            right: 0;
            width: 280px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .admin-form h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        
        .admin-form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .admin-form button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        
        .content {
            padding: 30px;
        }
        
        .category-selector {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .selector-group {
            margin-bottom: 20px;
        }
        
        .selector-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .selector-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }
        
        .selector-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .edit-btn {
            background: #f59e0b;
            color: white;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.2em; }
            .content { padding: 20px; }
            .btn { padding: 8px 16px; font-size: 12px; }
            th, td { padding: 8px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
            <div class="admin-panel">
                <button class="admin-toggle" onclick="toggleAdminPanel()">🔒 Админ-панель</button>
                <div class="admin-form" id="adminForm">
                    <h3>🔐 Вход для администратора</h3>
                    <input type="password" id="adminPassword" placeholder="Введите пароль">
                    <button onclick="loginAdmin()">Войти</button>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="category-selector">
                <div class="selector-group">
                    <label>📁 Выберите категорию:</label>
                    <select id="mainCategory" onchange="onCategoryChange()">
                        <option value="">-- Выберите категорию --</option>
                        <option value="protein">🥛 Протеины</option>
                        <option value="creatine">⚡ Креатин</option>
                        <option value="amino">🔗 Аминокислоты</option>
                        <option value="preworkout">🏃 Предтреники</option>
                        <option value="fatburner">🔥 Жиросжигатели</option>
                        <option value="vitamins">💊 Витамины</option>
                        <option value="gainer">⚖️ Гейнеры</option>
                    </select>
                </div>
                
                <div class="selector-group" id="subCategoryGroup" style="display:none;">
                    <label>📋 Выберите тип:</label>
                    <select id="subCategory" onchange="onSubCategoryChange()">
                        <option value="">-- Выберите тип --</option>
                    </select>
                </div>
                
                <div class="selector-group" id="brandGroup" style="display:none;">
                    <label>🏷️ Выберите бренд:</label>
                    <select id="brandSelect" onchange="onBrandSelect()">
                        <option value="">-- Выберите бренд --</option>
                    </select>
                </div>
            </div>
            
            <div class="table-container">
                <table id="dataTable" style="display:none;">
                    <thead id="tableHeaders">
                        <tr><th>№</th><th>Название</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белок</th><th>Углеводы</th><th>Жиры</th><th>Рейтинг</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            
            <div class="status-bar">
                <span>📊 Статус: <span id="statusText">Выберите категорию</span></span>
                <div class="product-count" id="productCount">0</div>
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="addProduct()">➕ Добавить продукт</button>
                <button class="btn" onclick="resetForm()">🔄 Сбросить форму</button>
                <button class="btn" onclick="exportToExcel()">📊 Экспорт в Excel</button>
                <button class="btn" onclick="importFromExcel()">📂 Импорт из Excel</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== БАЗА ДАННЫХ ====================
        let isAdmin = false;
        let currentCategory = '';
        
        let database = {
            protein: { types: ["Сывороточный", "Казеиновый", "Яичный", "Соевый"], brands: ["MyProtein", "Optimum Nutrition", "RPS", "Dymatize"], products: [] },
            creatine: { types: ["Моногидрат", "Гидрохлорид"], brands: ["MyProtein", "Creapure", "MuscleTech"], products: [] },
            amino: { types: ["BCAA", "EAA", "Глютамин", "Аргинин"], brands: ["Scitec", "MyProtein", "Optimum Nutrition"], products: [] },
            preworkout: { types: ["Стимулирующий", "Нестимулирующий"], brands: ["RPS", "C4", "JYM"], products: [] },
            fatburner: { types: ["Термогеник", "Липотропик"], brands: ["Hydroxycut", "Lipo-6"], products: [] },
            vitamins: { types: ["Мультивитамины", "Витамины B", "Витамин D"], brands: ["Optimum Nutrition", "NOW Foods", "Solgar"], products: [] },
            gainer: { types: ["Высококалорийный", "Сбалансированный"], brands: ["Serious Mass", "Pro Complex"], products: [] }
        };
        
        // ==================== СТАНДАРТНЫЕ ДАННЫЕ ДЛЯ ПРИМЕРА ====================
        const defaultProducts = {
            protein: [
                { id: "p1", type: "Сывороточный", brand: "MyProtein", name: "Impact Whey", weight: 1000, price: 3790, protein: 78, carbs: 5.5, fats: 5.2, rating: 5 },
                { id: "p2", type: "Сывороточный", brand: "Optimum Nutrition", name: "Gold Standard", weight: 2270, price: 5490, protein: 82, carbs: 4, fats: 2, rating: 5 },
                { id: "p3", type: "Казеиновый", brand: "MyProtein", name: "Casein", weight: 2500, price: 4190, protein: 80, carbs: 4, fats: 2, rating: 4 }
            ],
            creatine: [
                { id: "c1", type: "Моногидрат", brand: "MyProtein", name: "Creatine Monohydrate", weight: 500, price: 1190, protein: 0, carbs: 0, fats: 0, rating: 5 }
            ]
        };
        
        // ==================== ЗАГРУЗКА И СОХРАНЕНИЕ ====================
        function loadData() {
            const saved = localStorage.getItem('sportnutrition_db');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    for (let cat in parsed) {
                        if (database[cat]) {
                            database[cat].products = parsed[cat].products || [];
                        }
                    }
                    updateStatus("📀 Данные загружены из локального хранилища");
                } catch(e) {
                    setDefaultData();
                }
            } else {
                setDefaultData();
            }
        }
        
        function setDefaultData() {
            for (let cat in defaultProducts) {
                if (database[cat]) {
                    database[cat].products = defaultProducts[cat];
                }
            }
            saveData();
            updateStatus("✨ Созданы стандартные данные");
        }
        
        function saveData() {
            const toSave = {};
            for (let cat in database) {
                toSave[cat] = { products: database[cat].products };
            }
            localStorage.setItem('sportnutrition_db', JSON.stringify(toSave));
            updateStatus("💾 Данные сохранены");
        }
        
        function updateStatus(message) {
            const statusSpan = document.getElementById('statusText');
            if (statusSpan) statusSpan.textContent = message;
            console.log(message);
        }
        
        // ==================== ВЫБОР КАТЕГОРИИ ====================
        function onCategoryChange() {
            const category = document.getElementById('mainCategory').value;
            currentCategory = category;
            
            if (!category) {
                document.getElementById('subCategoryGroup').style.display = 'none';
                document.getElementById('brandGroup').style.display = 'none';
                document.getElementById('dataTable').style.display = 'none';
                return;
            }
            
            const subSelect = document.getElementById('subCategory');
            subSelect.innerHTML = '<option value="">-- Выберите тип --</option>';
            
            if (database[category] && database[category].types) {
                database[category].types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    subSelect.appendChild(option);
                });
            }
            
            document.getElementById('subCategoryGroup').style.display = 'block';
            document.getElementById('brandGroup').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
        }
        
        function onSubCategoryChange() {
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            
            if (!subType) {
                document.getElementById('brandGroup').style.display = 'none';
                document.getElementById('dataTable').style.display = 'none';
                return;
            }
            
            const brandSelect = document.getElementById('brandSelect');
            brandSelect.innerHTML = '<option value="">-- Выберите бренд --</option>';
            
            if (database[category] && database[category].brands) {
                database[category].brands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand;
                    option.textContent = brand;
                    brandSelect.appendChild(option);
                });
            }
            
            document.getElementById('brandGroup').style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
        }
        
        function onBrandSelect() {
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            const brand = document.getElementById('brandSelect').value;
            
            if (!category || !subType || !brand) return;
            showTable(category, subType, brand);
        }
        
        // ==================== ПОКАЗ ТАБЛИЦЫ ====================
        function showTable(category, subType, brand) {
            const headers = document.getElementById('tableHeaders');
            const body = document.getElementById('tableBody');
            
            headers.innerHTML = `
                <th>№</th>
                <th>Название</th>
                <th>Вес(г)</th>
                <th>Цена(₽)</th>
                <th>Белок</th>
                <th>Углеводы</th>
                <th>Жиры</th>
                <th>Рейтинг</th>
                ${isAdmin ? '<th>Действия</th>' : ''}
            `;
            
            const products = database[category]?.products?.filter(p => p.type === subType && p.brand === brand) || [];
            
            body.innerHTML = '';
            
            if (products.length === 0) {
                body.innerHTML = `<tr><td colspan="${isAdmin ? 9 : 8}" style="text-align:center; padding:40px;">📭 Нет продуктов. ${isAdmin ? 'Нажмите "Добавить продукт"' : ''}</td></tr>`;
            } else {
                products.forEach((product, index) => {
                    const row = body.insertRow();
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${product.name}</td>
                        <td>${product.weight}</td>
                        <td>${product.price}</td>
                        <td>${product.protein || '-'}</td>
                        <td>${product.carbs || '-'}</td>
                        <td>${product.fats || '-'}</td>
                        <td>${'⭐'.repeat(product.rating || 0)}</td>
                        ${isAdmin ? `<td><button class="edit-btn" onclick="editProduct('${product.id}')">✏️</button> <button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑️</button></td>` : ''}
                    `;
                });
            }
            
            document.getElementById('dataTable').style.display = 'table';
            document.getElementById('productCount').textContent = products.length;
        }
        
        // ==================== АДМИН-ПАНЕЛЬ ====================
        function toggleAdminPanel() {
            const form = document.getElementById('adminForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }
        
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === "admin123") {
                isAdmin = true;
                alert("✅ Вы вошли как администратор");
                document.getElementById('adminForm').style.display = 'none';
                document.getElementById('addBtn').style.display = 'inline-flex';
                
                const brand = document.getElementById('brandSelect').value;
                if (brand) onBrandSelect();
                updateStatus("Режим администратора активен");
            } else {
                alert("❌ Неверный пароль");
                document.getElementById('adminPassword').value = '';
            }
        }
        
        // ==================== ДОБАВЛЕНИЕ ПРОДУКТА ====================
        function addProduct() {
            if (!isAdmin) {
                alert("❌ Только администратор");
                return;
            }
            
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            const brand = document.getElementById('brandSelect').value;
            
            if (!category || !subType || !brand) {
                alert("⚠️ Сначала выберите категорию, тип и бренд");
                return;
            }
            
            const name = prompt("Название продукта:");
            if (!name) return;
            
            const weight = prompt("Вес (г):");
            if (!weight) return;
            
            const price = prompt("Цена (₽):");
            if (!price) return;
            
            const protein = prompt("Белок на 100г:");
            
            const newProduct = {
                id: Date.now().toString(),
                type: subType,
                brand: brand,
                name: name,
                weight: parseInt(weight),
                price: parseInt(price),
                protein: protein ? parseInt(protein) : 0,
                carbs: 0,
                fats: 0,
                rating: 5
            };
            
            if (!database[category].products) database[category].products = [];
            database[category].products.push(newProduct);
            
            saveData();
            onBrandSelect();
            alert("✅ Продукт добавлен!");
        }
        
        // ==================== РЕДАКТИРОВАНИЕ ====================
        function editProduct(id) {
            if (!isAdmin) return;
            
            const category = currentCategory;
            const product = database[category]?.products?.find(p => p.id === id);
            if (!product) return;
            
            const newName = prompt("Новое название:", product.name);
            if (newName && newName !== product.name) product.name = newName;
            
            const newPrice = prompt("Новая цена (₽):", product.price);
            if (newPrice && newPrice != product.price) product.price = parseInt(newPrice);
            
            saveData();
            onBrandSelect();
            alert("✅ Сохранено");
        }
        
        // ==================== УДАЛЕНИЕ ====================
        function deleteProduct(id) {
            if (!isAdmin) return;
            if (!confirm("❓ Удалить этот продукт?")) return;
            
            const category = currentCategory;
            const index = database[category]?.products?.findIndex(p => p.id === id);
            if (index !== undefined && index !== -1) {
                database[category].products.splice(index, 1);
                saveData();
                onBrandSelect();
                alert("✅ Продукт удалён");
            }
        }
        
        // ==================== СБРОС ФОРМЫ ====================
        function resetForm() {
            document.getElementById('mainCategory').value = '';
            document.getElementById('subCategory').innerHTML = '<option value="">-- Выберите тип --</option>';
            document.getElementById('brandSelect').innerHTML = '<option value="">-- Выберите бренд --</option>';
            document.getElementById('subCategoryGroup').style.display = 'none';
            document.getElementById('brandGroup').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
            document.getElementById('productCount').textContent = '0';
            updateStatus("Форма сброшена");
        }
        
        // ==================== ЭКСПОРТ В EXCEL ====================
        function exportToExcel() {
            let csv = "\uFEFFКатегория;Тип;Бренд;Название;Вес(г);Цена(₽);Белок;Углеводы;Жиры;Рейтинг\n";
            
            for (const [cat, data] of Object.entries(database)) {
                if (data.products && data.products.length > 0) {
                    data.products.forEach(p => {
                        csv += `${cat};${p.type};${p.brand};${p.name};${p.weight};${p.price};${p.protein || 0};${p.carbs || 0};${p.fats || 0};${p.rating}\n`;
                    });
                }
            }
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `sportnutrition_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            alert("✅ Данные выгружены в CSV");
        }
        
        // ==================== ИМПОРТ ИЗ EXCEL ====================
        function importFromExcel() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    const csv = event.target.result;
                    const rows = csv.split('\n');
                    
                    // Пропускаем заголовок
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i].trim()) {
                            const cols = rows[i].split(';');
                            if (cols.length >= 9) {
                                const category = cols[0];
                                if (database[category]) {
                                    const newProduct = {
                                        id: Date.now() + i + Math.random(),
                                        type: cols[1],
                                        brand: cols[2],
                                        name: cols[3],
                                        weight: parseInt(cols[4]) || 0,
                                        price: parseInt(cols[5]) || 0,
                                        protein: parseInt(cols[6]) || 0,
                                        carbs: parseInt(cols[7]) || 0,
                                        fats: parseInt(cols[8]) || 0,
                                        rating: parseInt(cols[9]) || 5
                                    };
                                    database[category].products.push(newProduct);
                                }
                            }
                        }
                    }
                    
                    saveData();
                    alert("✅ Данные импортированы!");
                    resetForm();
                };
                reader.readAsText(file, 'UTF-8');
            };
            input.click();
        }
        
        // ==================== ЗАПУСК ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            document.getElementById('addBtn').style.display = 'none';
        });
    </script>
</body>
</html>
