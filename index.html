<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | База данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .admin-panel {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .admin-toggle {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .admin-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .admin-form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            position: absolute;
            right: 0;
            width: 280px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .admin-form h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        
        .admin-form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .admin-form button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        
        .content {
            padding: 30px;
        }
        
        .category-selector {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .selector-group {
            margin-bottom: 20px;
        }
        
        .selector-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .selector-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }
        
        .selector-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .edit-btn {
            background: #f59e0b;
            color: white;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.2em; }
            .content { padding: 20px; }
            .btn { padding: 8px 16px; font-size: 12px; }
            th, td { padding: 8px 10px; font-size: 12px; }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal-buttons button:first-child {
            background: #667eea;
            color: white;
        }
        
        .modal-buttons button:last-child {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
            <div class="admin-panel">
                <button class="admin-toggle" onclick="toggleAdminPanel()">🔒 Админ-панель</button>
                <div class="admin-form" id="adminForm">
                    <h3>🔐 Вход для администратора</h3>
                    <input type="password" id="adminPassword" placeholder="Введите пароль">
                    <button onclick="loginAdmin()">Войти</button>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="category-selector">
                <div class="selector-group">
                    <label>📁 Выберите категорию:</label>
                    <select id="mainCategory" onchange="onCategoryChange()">
                        <option value="">-- Выберите категорию --</option>
                        <option value="protein">🥛 Протеины</option>
                        <option value="creatine">⚡ Креатин</option>
                        <option value="bcaa">🔗 BCAA / Аминокислоты</option>
                        <option value="carnitine">🔥 L-Карнитин</option>
                        <option value="gainer">⚖️ Гейнеры</option>
                    </select>
                </div>
                
                <div class="selector-group" id="subCategoryGroup" style="display:none;">
                    <label>📋 Выберите тип:</label>
                    <select id="subCategory" onchange="onSubCategoryChange()">
                        <option value="">-- Выберите тип --</option>
                    </select>
                </div>
                
                <div class="selector-group" id="brandGroup" style="display:none;">
                    <label>🏷️ Выберите бренд:</label>
                    <select id="brandSelect" onchange="onBrandSelect()">
                        <option value="">-- Выберите бренд --</option>
                    </select>
                </div>
            </div>
            
            <div class="table-container">
                <table id="dataTable" style="display:none;">
                    <thead id="tableHeaders">
                        <tr><th>№</th><th>Название</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белок</th><th>Порция</th><th>Цена/порция</th><th>Рейтинг</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            
            <div class="status-bar">
                <span>📊 Статус: <span id="statusText">Выберите категорию</span></span>
                <div class="product-count" id="productCount">0</div>
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="addProduct()">➕ Добавить продукт</button>
                <button class="btn btn-success" onclick="exportToExcel()">📊 Экспорт в Excel</button>
                <button class="btn" onclick="resetForm()">🔄 Сбросить форму</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления продукта -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>➕ ДОБАВИТЬ НОВЫЙ ПРОДУКТ</h3>
            <input type="text" id="newName" placeholder="Название продукта">
            <input type="number" id="newWeight" placeholder="Вес (г)">
            <input type="number" id="newPrice" placeholder="Цена (₽)">
            <input type="number" id="newProtein" placeholder="Белок на 100г (г)">
            <input type="number" id="newPortion" placeholder="Порция (г)">
            <select id="newRating">
                <option value="5">⭐⭐⭐⭐⭐ Отлично</option>
                <option value="4">⭐⭐⭐⭐ Хорошо</option>
                <option value="3">⭐⭐⭐ Средне</option>
                <option value="2">⭐⭐ Плохо</option>
                <option value="1">⭐ Ужасно</option>
            </select>
            <div class="modal-buttons">
                <button onclick="saveNewProduct()">💾 СОХРАНИТЬ</button>
                <button onclick="closeModal()">❌ ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== ДАННЫЕ ====================
        let isAdmin = false;
        let currentCategory = '';
        let currentType = '';
        let currentBrand = '';
        
        // СТРУКТУРА БАЗЫ ДАННЫХ
        let database = {
            protein: {
                name: "Протеины",
                types: ["Сывороточный концентрат", "Сывороточный изолят", "Сывороточный гидролизат", "Казеин", "Мицеллярный казеин", "Соевый", "Яичный", "Комплексный"],
                brands: ["MyProtein", "Optimum Nutrition", "RPS", "Dymatize", "BSN", "GeneticLab", "Maxler"],
                products: [
                    { id: "p1", type: "Сывороточный концентрат", brand: "MyProtein", name: "Impact Whey", weight: 1000, price: 3790, protein: 78, portion: 30, rating: 5 },
                    { id: "p2", type: "Сывороточный изолят", brand: "Optimum Nutrition", name: "Gold Standard Isolate", weight: 900, price: 4990, protein: 85, portion: 30, rating: 5 },
                    { id: "p3", type: "Казеин", brand: "MyProtein", name: "Casein", weight: 2500, price: 4190, protein: 80, portion: 35, rating: 4 },
                    { id: "p4", type: "Сывороточный концентрат", brand: "RPS", name: "Whey Pro", weight: 920, price: 2990, protein: 90, portion: 30, rating: 4 }
                ]
            },
            creatine: {
                name: "Креатин",
                types: ["Моногидрат", "Гидрохлорид", "Магниевый", "Креалкалин", "Жидкий креатин"],
                brands: ["MyProtein", "Creapure", "MuscleTech", "RPS", "Optimum Nutrition", "GeneticLab"],
                products: [
                    { id: "c1", type: "Моногидрат", brand: "MyProtein", name: "Creatine Monohydrate", weight: 500, price: 1190, protein: 0, portion: 5, rating: 5 },
                    { id: "c2", type: "Моногидрат", brand: "Creapure", name: "Creapure Creatine", weight: 300, price: 890, protein: 0, portion: 5, rating: 5 },
                    { id: "c3", type: "Гидрохлорид", brand: "MuscleTech", name: "Creatine HCl", weight: 400, price: 2490, protein: 0, portion: 3, rating: 4 }
                ]
            },
            bcaa: {
                name: "BCAA / Аминокислоты",
                types: ["BCAA 2:1:1", "BCAA 4:1:1", "BCAA 8:1:1", "EAA (незаменимые)", "Глютамин", "Аргинин", "Цитруллин"],
                brands: ["Scitec Nutrition", "MyProtein", "Optimum Nutrition", "RPS", "BioTech USA", "GeneticLab"],
                products: [
                    { id: "b1", type: "BCAA 2:1:1", brand: "MyProtein", name: "BCAA Powder", weight: 500, price: 1490, protein: 0, portion: 5, rating: 5 },
                    { id: "b2", type: "BCAA 2:1:1", brand: "Scitec Nutrition", name: "BCAA Xpress", weight: 400, price: 1790, protein: 0, portion: 5, rating: 4 },
                    { id: "b3", type: "EAA (незаменимые)", brand: "Optimum Nutrition", name: "Essential Amino Energy", weight: 435, price: 2490, protein: 0, portion: 10, rating: 5 }
                ]
            },
            carnitine: {
                name: "L-Карнитин",
                types: ["L-Карнитин тартрат", "Ацетил-L-карнитин", "Пропионил-L-карнитин", "L-Карнитин жидкий"],
                brands: ["MyProtein", "RPS", "GeneticLab", "NOW Foods", "Maxler", "BioTech USA"],
                products: [
                    { id: "l1", type: "L-Карнитин тартрат", brand: "MyProtein", name: "L-Carnitine", weight: 180, price: 1090, protein: 0, portion: 1, rating: 5 },
                    { id: "l2", type: "Ацетил-L-карнитин", brand: "NOW Foods", name: "Acetyl L-Carnitine", weight: 100, price: 1290, protein: 0, portion: 1, rating: 4 },
                    { id: "l3", type: "L-Карнитин жидкий", brand: "RPS", name: "L-Carnitine 3000", weight: 500, price: 1290, protein: 0, portion: 30, rating: 4 }
                ]
            },
            gainer: {
                name: "Гейнеры",
                types: ["Высококалорийный (1000+ ккал)", "Среднекалорийный (500-700 ккал)", "Протеиновый гейнер", "С низким содержанием сахара"],
                brands: ["MyProtein", "Optimum Nutrition", "RPS", "BSN", "MuscleTech", "Dymatize"],
                products: [
                    { id: "g1", type: "Высококалорийный", brand: "Optimum Nutrition", name: "Serious Mass", weight: 5440, price: 3990, protein: 50, portion: 100, rating: 5 },
                    { id: "g2", type: "Высококалорийный", brand: "MyProtein", name: "Weight Gainer", weight: 2500, price: 2290, protein: 35, portion: 100, rating: 4 },
                    { id: "g3", type: "Протеиновый гейнер", brand: "BSN", name: "True Mass", weight: 2600, price: 3490, protein: 40, portion: 75, rating: 4 }
                ]
            }
        };
        
        // ЗАГРУЗКА СОХРАНЕННЫХ ДАННЫХ
        function loadFromStorage() {
            const saved = localStorage.getItem('sportnutrition_db');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    for (let cat in parsed) {
                        if (database[cat]) {
                            database[cat].products = parsed[cat].products;
                        }
                    }
                    updateStatus("💾 Данные загружены из сохранений");
                } catch(e) {}
            }
        }
        
        // СОХРАНЕНИЕ ДАННЫХ
        function saveToStorage() {
            const toSave = {};
            for (let cat in database) {
                toSave[cat] = { products: database[cat].products };
            }
            localStorage.setItem('sportnutrition_db', JSON.stringify(toSave));
            updateStatus("💾 Данные сохранены");
        }
        
        // ВЫБОР КАТЕГОРИИ
        function onCategoryChange() {
            const category = document.getElementById('mainCategory').value;
            currentCategory = category;
            
            if (!category) {
                document.getElementById('subCategoryGroup').style.display = 'none';
                document.getElementById('brandGroup').style.display = 'none';
                document.getElementById('dataTable').style.display = 'none';
                return;
            }
            
            // Заполняем типы
            const subSelect = document.getElementById('subCategory');
            subSelect.innerHTML = '<option value="">-- Выберите тип --</option>';
            
            if (database[category] && database[category].types) {
                database[category].types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    subSelect.appendChild(option);
                });
            }
            
            document.getElementById('subCategoryGroup').style.display = 'block';
            document.getElementById('brandGroup').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
            updateStatus(`Выбрана категория: ${database[category].name}`);
        }
        
        // ВЫБОР ТИПА
        function onSubCategoryChange() {
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            currentType = subType;
            
            if (!subType) {
                document.getElementById('brandGroup').style.display = 'none';
                document.getElementById('dataTable').style.display = 'none';
                return;
            }
            
            // Заполняем бренды (уникальные для выбранного типа)
            const brandSelect = document.getElementById('brandSelect');
            brandSelect.innerHTML = '<option value="">-- Выберите бренд --</option>';
            
            // Собираем уникальные бренды из продуктов этого типа
            const productsInType = database[category].products.filter(p => p.type === subType);
            const uniqueBrands = [...new Set(productsInType.map(p => p.brand))];
            
            // Добавляем общие бренды из конфигурации
            if (database[category].brands) {
                database[category].brands.forEach(brand => {
                    if (!uniqueBrands.includes(brand)) {
                        uniqueBrands.push(brand);
                    }
                });
            }
            
            uniqueBrands.sort().forEach(brand => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                brandSelect.appendChild(option);
            });
            
            document.getElementById('brandGroup').style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
            updateStatus(`Тип: ${subType}`);
        }
        
        // ВЫБОР БРЕНДА
        function onBrandSelect() {
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            const brand = document.getElementById('brandSelect').value;
            currentBrand = brand;
            
            if (!category || !subType || !brand) return;
            
            showTable(category, subType, brand);
        }
        
        // ПОКАЗ ТАБЛИЦЫ
        function showTable(category, subType, brand) {
            const headers = document.getElementById('tableHeaders');
            const body = document.getElementById('tableBody');
            
            headers.innerHTML = `
                <th>№</th>
                <th>Название</th>
                <th>Вес(г)</th>
                <th>Цена(₽)</th>
                <th>Белок/100г</th>
                <th>Порция(г)</th>
                <th>Цена/порция(₽)</th>
                <th>Рейтинг</th>
                ${isAdmin ? '<th>Действия</th>' : ''}
            `;
            
            const products = database[category].products.filter(p => p.type === subType && p.brand === brand);
            
            body.innerHTML = '';
            
            if (products.length === 0) {
                body.innerHTML = `<tr><td colspan="${isAdmin ? 9 : 8}" style="text-align:center; padding:40px;">📭 Нет продуктов. ${isAdmin ? 'Нажмите "Добавить продукт"' : ''}</td></tr>`;
            } else {
                products.forEach((product, index) => {
                    const pricePerPortion = (product.price / product.weight * product.portion).toFixed(2);
                    const row = body.insertRow();
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${product.name}</td>
                        <td>${product.weight} g</td>
                        <td>${product.price} ₽</td>
                        <td>${product.protein || '-'} g</td>
                        <td>${product.portion} g</td>
                        <td>${pricePerPortion} ₽</td>
                        <td>${'⭐'.repeat(product.rating || 5)}</td>
                        ${isAdmin ? `<td><button class="edit-btn" onclick="editProduct('${product.id}')">✏️</button> <button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑️</button></td>` : ''}
                    `;
                });
            }
            
            document.getElementById('dataTable').style.display = 'table';
            document.getElementById('productCount').textContent = products.length;
            updateStatus(`${products.length} продукт(ов) найдено`);
        }
        
        // АДМИН-ПАНЕЛЬ
        function toggleAdminPanel() {
            const form = document.getElementById('adminForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }
        
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === "admin123") {
                isAdmin = true;
                alert("✅ Вы вошли как администратор");
                document.getElementById('adminForm').style.display = 'none';
                document.getElementById('addBtn').style.display = 'inline-flex';
                
                const brand = document.getElementById('brandSelect').value;
                if (brand) onBrandSelect();
                updateStatus("Режим администратора активен");
            } else {
                alert("❌ Неверный пароль");
                document.getElementById('adminPassword').value = '';
            }
        }
        
        // ДОБАВЛЕНИЕ ПРОДУКТА
        function addProduct() {
            if (!isAdmin) {
                alert("❌ Только администратор");
                return;
            }
            
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            const brand = document.getElementById('brandSelect').value;
            
            if (!category || !subType || !brand) {
                alert("⚠️ Сначала выберите категорию, тип и бренд");
                return;
            }
            
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function saveNewProduct() {
            const category = currentCategory;
            const subType = document.getElementById('subCategory').value;
            const brand = document.getElementById('brandSelect').value;
            
            const name = document.getElementById('newName').value;
            const weight = document.getElementById('newWeight').value;
            const price = document.getElementById('newPrice').value;
            const protein = document.getElementById('newProtein').value;
            const portion = document.getElementById('newPortion').value;
            const rating = document.getElementById('newRating').value;
            
            if (!name || !weight || !price) {
                alert("⚠️ Заполните название, вес и цену");
                return;
            }
            
            const newProduct = {
                id: Date.now().toString(),
                type: subType,
                brand: brand,
                name: name,
                weight: parseInt(weight),
                price: parseInt(price),
                protein: protein ? parseInt(protein) : 0,
                portion: portion ? parseInt(portion) : 0,
                rating: parseInt(rating)
            };
            
            database[category].products.push(newProduct);
            saveToStorage();
            closeModal();
            onBrandSelect();
            alert("✅ Продукт добавлен!");
            
            // Очищаем форму
            document.getElementById('newName').value = '';
            document.getElementById('newWeight').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newProtein').value = '';
            document.getElementById('newPortion').value = '';
        }
        
        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }
        
        // РЕДАКТИРОВАНИЕ
        function editProduct(id) {
            if (!isAdmin) return;
            
            const category = currentCategory;
            const product = database[category].products.find(p => p.id === id);
            if (!product) return;
            
            const newName = prompt("Новое название:", product.name);
            if (newName && newName !== product.name) product.name = newName;
            
            const newPrice = prompt("Новая цена (₽):", product.price);
            if (newPrice && newPrice != product.price) product.price = parseInt(newPrice);
            
            saveToStorage();
            onBrandSelect();
            alert("✅ Сохранено");
        }
        
        // УДАЛЕНИЕ
        function deleteProduct(id) {
            if (!isAdmin) return;
            if (!confirm("❓ Удалить этот продукт?")) return;
            
            const category = currentCategory;
            const index = database[category].products.findIndex(p => p.id === id);
            if (index !== -1) {
                database[category].products.splice(index, 1);
                saveToStorage();
                onBrandSelect();
                alert("✅ Продукт удалён");
            }
        }
        
        // СБРОС ФОРМЫ
        function resetForm() {
            document.getElementById('mainCategory').value = '';
            document.getElementById('subCategory').innerHTML = '<option value="">-- Выберите тип --</option>';
            document.getElementById('brandSelect').innerHTML = '<option value="">-- Выберите бренд --</option>';
            document.getElementById('subCategoryGroup').style.display = 'none';
            document.getElementById('brandGroup').style.display = 'none';
            document.getElementById('dataTable').style.display = 'none';
            document.getElementById('productCount').textContent = '0';
            updateStatus("Форма сброшена");
        }
        
        // ЭКСПОРТ В EXCEL
        function exportToExcel() {
            let csv = "\uFEFFКатегория;Тип;Бренд;Название;Вес(г);Цена(₽);Белок/100г;Порция(г);Рейтинг\n";
            
            for (const [cat, data] of Object.entries(database)) {
                if (data.products && data.products.length > 0) {
                    data.products.forEach(p => {
                        csv += `${data.name};${p.type};${p.brand};${p.name};${p.weight};${p.price};${p.protein || 0};${p.portion || 0};${p.rating}\n`;
                    });
                }
            }
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `sportnutrition_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            alert("✅ Данные выгружены в CSV");
        }
        
        function updateStatus(message) {
            const statusSpan = document.getElementById('statusText');
            if (statusSpan) statusSpan.textContent = message;
            console.log(message);
        }
        
        // ЗАПУСК
        document.addEventListener('DOMContentLoaded', function() {
            loadFromStorage();
            document.getElementById('addBtn').style.display = 'none';
            updateStatus("Выберите категорию");
        });
    </script>
</body>
</html>
