<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | База данных</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; text-align: center; position: relative; }
        .header h1 { font-size: 1.5em; }
        .admin-panel { position: absolute; top: 15px; right: 20px; }
        .admin-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        .admin-toggle:hover { background: rgba(255,255,255,0.3); }
        .admin-form { background: white; padding: 20px; border-radius: 12px; margin-top: 10px; display: none; position: absolute; right: 0; width: 280px; z-index: 100; }
        .admin-form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .admin-form button { background: #667eea; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
        .content { padding: 25px; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select { flex: 1; min-width: 150px; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #667eea; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f5f5; }
        .status-bar { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .product-count { background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; }
        .actions { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { transform: translateY(-2px); background: #5a67d8; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 3px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        @media (max-width: 768px) { th, td { font-size: 11px; padding: 6px; } .filter-bar select { font-size: 12px; } .btn { padding: 8px 16px; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .modal-buttons button:first-child { background: #667eea; color: white; }
        .modal-buttons button:last-child { background: #ef4444; color: white; }
        .rating { color: #f59e0b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
        <div class="admin-panel">
            <button class="admin-toggle" id="adminToggleBtn">🔑 Админ-панель</button>
            <div class="admin-form" id="adminForm">
                <h3>🔐 Вход администратора</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button id="loginBtn">Войти</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="filter-bar">
            <select id="categoryFilter">
                <option value="">📁 Все категории</option>
                <option value="Протеины">🥛 Протеины</option>
                <option value="Креатин">⚡ Креатин</option>
                <option value="Аминокислоты">🔗 Аминокислоты</option>
                <option value="Жиросжигатели">🔥 Жиросжигатели</option>
                <option value="Гейнеры">⚖️ Гейнеры</option>
            </select>
            <select id="typeFilter">
                <option value="">📋 Все типы</option>
            </select>
            <select id="brandFilter">
                <option value="">🏷️ Все бренды</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr><th>Название</th><th>Категория</th><th>Тип</th><th>Бренд</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белки</th><th>Жиры</th><th>Углеводы</th><th>Рейтинг</th><th id="actionsHeader">Действия</th><tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" style="text-align:center; padding:40px;">🔄 Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="status-bar">
            <span id="statusText">Загрузка...</span>
            <div class="product-count" id="productCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="addBtn" style="display:none;">➕ Добавить продукт</button>
            <button class="btn" id="refreshBtn">🔄 Обновить</button>
            <button class="btn" id="exportExcelBtn" style="background:#f59e0b; color:white;">📊 Экспорт в Excel</button>
            <button class="btn" id="importExcelBtn" style="background:#10b981; color:white;">📂 Импорт из Excel</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ НОВЫЙ ПРОДУКТ</h3>
        
        <label>Название продукта *</label>
        <input type="text" id="newName" placeholder="Пример: Impact Whey">
        
        <label>Категория</label>
        <select id="newCategory">
            <option value="Протеины">🥛 Протеины</option>
            <option value="Креатин">⚡ Креатин</option>
            <option value="Аминокислоты">🔗 Аминокислоты</option>
            <option value="Жиросжигатели">🔥 Жиросжигатели</option>
            <option value="Гейнеры">⚖️ Гейнеры</option>
        </select>
        
        <label>Тип продукта</label>
        <input type="text" id="newType" placeholder="Сывороточный, Моногидрат, BCAA...">
        
        <label>Бренд</label>
        <input type="text" id="newBrand" placeholder="MyProtein, Optimum Nutrition...">
        
        <div class="form-row">
            <div style="flex:1">
                <label>Вес (г)</label>
                <input type="number" id="newWeight" placeholder="1000">
            </div>
            <div style="flex:1">
                <label>Цена (₽)</label>
                <input type="number" id="newPrice" placeholder="3000">
            </div>
        </div>
        
        <div class="form-row">
            <div style="flex:1">
                <label>Белки (г/100г)</label>
                <input type="number" step="0.1" id="newProtein" placeholder="70">
            </div>
            <div style="flex:1">
                <label>Жиры (г/100г)</label>
                <input type="number" step="0.1" id="newFats" placeholder="5">
            </div>
            <div style="flex:1">
                <label>Углеводы (г/100г)</label>
                <input type="number" step="0.1" id="newCarbs" placeholder="10">
            </div>
        </div>
        
        <label>Рейтинг</label>
        <select id="newRating">
            <option value="5">⭐⭐⭐⭐⭐ Отлично</option>
            <option value="4">⭐⭐⭐⭐ Хорошо</option>
            <option value="3">⭐⭐⭐ Средне</option>
            <option value="2">⭐⭐ Плохо</option>
            <option value="1">⭐ Ужасно</option>
        </select>
        
        <div class="modal-buttons">
            <button id="saveProductBtn">💾 СОХРАНИТЬ</button>
            <button id="closeModalBtn">❌ ОТМЕНА</button>
        </div>
    </div>
</div>
<script>
    // ==================== SUPABASE НАСТРОЙКИ (БЕЗ ДУБЛИРОВАНИЯ) ====================
    const SUPABASE_URL = "https://gfegddnmqtwamxlmxqba.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_BQm4AqGZgqOQ5WLe26UR-g_BtES9KtI";
    
    // ВСЕ ПЕРЕМЕННЫЕ В ОДНОМ МЕСТЕ
    let supabaseClient = null;
    let isAdmin = false;
    let allProducts = [];
    
    // ПОДКЛЮЧЕНИЕ К SUPABASE
    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Supabase подключен");
    } else {
        console.log("❌ Supabase не загрузился");
        document.getElementById('statusText').innerHTML = '❌ Ошибка: проверьте интернет';
    }
    
    // ЗАГРУЗКА ДАННЫХ
    async function loadProducts() {
        if (!supabaseClient) {
            document.getElementById('statusText').innerHTML = '⚠️ Ошибка подключения';
            return;
        }
        
        document.getElementById('statusText').innerHTML = '🔄 Загрузка...';
        
        const { data, error } = await supabaseClient.from('products').select('*').order('id', { ascending: false });
        
        if (error) {
            console.log("❌ Ошибка:", error);
            document.getElementById('statusText').innerHTML = '❌ Ошибка: ' + error.message;
            allProducts = [];
            displayProducts();
        } else {
            allProducts = data || [];
            updateFilters();
            displayProducts();
            document.getElementById('statusText').innerHTML = `✅ ${allProducts.length} продуктов`;
            document.getElementById('productCount').textContent = allProducts.length;
        }
    }
    
    // ОТОБРАЖЕНИЕ ТАБЛИЦЫ
    function displayProducts() {
        const category = document.getElementById('categoryFilter').value;
        const type = document.getElementById('typeFilter').value;
        const brand = document.getElementById('brandFilter').value;
        
        let filtered = allProducts;
        if (category) filtered = filtered.filter(p => p.category === category);
        if (type) filtered = filtered.filter(p => p.type === type);
        if (brand) filtered = filtered.filter(p => p.brand === brand);
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:40px;">📭 Нет продуктов</td></tr>';
            return;
        }
        
        filtered.forEach(product => {
            const ratingStars = '⭐'.repeat(product.rating || 5);
            const actions = isAdmin ? `<td><button class="edit-btn" onclick="editProduct(${product.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️</button></td>` : '<td></td>';
            
            tbody.innerHTML += `
                <tr>
                    <td>${product.name || ''}</td>
                    <td>${product.category || ''}</td>
                    <td>${product.type || ''}</td>
                    <td>${product.brand || ''}</td>
                    <td>${product.weight || 0} г</td>
                    <td>${product.price || 0} ₽</td>
                    <td>${product.protein || 0} г</td>
                    <td>${product.fats || 0} г</td>
                    <td>${product.carbs || 0} г</td>
                    <td class="rating">${ratingStars}</td>
                    ${actions}
                </tr>
            `;
        });
        
        document.getElementById('productCount').textContent = filtered.length;
    }
    
    // ФИЛЬТРЫ
    function updateFilters() {
        const types = [...new Set(allProducts.map(p => p.type).filter(t => t))];
        const brands = [...new Set(allProducts.map(p => p.brand).filter(b => b))];
        
        const typeSelect = document.getElementById('typeFilter');
        typeSelect.innerHTML = '<option value="">📋 Все типы</option>';
        types.forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);
        
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">🏷️ Все бренды</option>';
        brands.forEach(b => brandSelect.innerHTML += `<option value="${b}">${b}</option>`);
    }
    
    function filterData() { displayProducts(); }
    
    // ==================== АДМИН-ПАНЕЛЬ ====================
    function toggleAdminPanel() {
        const form = document.getElementById('adminForm');
        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
        } else {
            form.style.display = 'none';
        }
    }
    
    function loginAdmin() {
        const password = document.getElementById('adminPassword').value;
        
        if (password === "admin123") {
            isAdmin = true;
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('addBtn').style.display = 'inline-block';
            document.getElementById('adminPassword').value = '';
            
            alert("✅ Вы вошли как администратор!");
            displayProducts();
        } else {
            alert("❌ Неверный пароль! Пароль: admin123");
            document.getElementById('adminPassword').value = '';
        }
    }
    
    // ДОБАВЛЕНИЕ ПРОДУКТА
    async function addProduct() {
    if (!isAdmin) {
        alert("Только администратор");
        return;
    }
    
    const name = document.getElementById('newName').value.trim();
    if (!name) {
        alert("Введите название продукта!");
        document.getElementById('newName').focus();
        return;
    }
    
    const newProduct = {
        name: name,
        category: document.getElementById('newCategory').value,
        type: document.getElementById('newType').value.trim() || "Не указан",
        brand: document.getElementById('newBrand').value.trim() || "Не указан",
        weight: parseInt(document.getElementById('newWeight').value) || 0,
        price: parseInt(document.getElementById('newPrice').value) || 0,
        protein: parseFloat(document.getElementById('newProtein').value) || 0,
        fats: parseFloat(document.getElementById('newFats').value) || 0,
        carbs: parseFloat(document.getElementById('newCarbs').value) || 0,
        rating: parseInt(document.getElementById('newRating').value)
    };
    
    console.log("Отправляем продукт:", newProduct);
    
    const { data, error } = await supabaseClient.from('products').insert([newProduct]).select();
    
    if (error) {
        alert("❌ Ошибка: " + error.message);
        console.error(error);
    } else {
        alert("✅ Продукт добавлен!");
        closeModal();
        loadProducts();
        clearForm();
    }
}
    
    // РЕДАКТИРОВАНИЕ
    async function editProduct(id) {
        if (!isAdmin) return;
        const newName = prompt("Новое название:");
        if (!newName) return;
        
        await supabaseClient.from('products').update({ name: newName }).eq('id', id);
        loadProducts();
        alert("✅ Изменено");
    }
    
    // УДАЛЕНИЕ
    async function deleteProduct(id) {
        if (!isAdmin) return;
        if (!confirm("Удалить?")) return;
        
        await supabaseClient.from('products').delete().eq('id', id);
        loadProducts();
        alert("✅ Удалено");
    }
    
    function showAddForm() { 
        document.getElementById('addModal').style.display = 'flex'; 
        clearForm();
    }
    
    function closeModal() { 
        document.getElementById('addModal').style.display = 'none'; 
    }
    
    function clearForm() {
        document.getElementById('newName').value = '';
        document.getElementById('newType').value = 'Сывороточный';
        document.getElementById('newBrand').value = 'MyProtein';
        document.getElementById('newWeight').value = '1000';
        document.getElementById('newPrice').value = '3000';
        document.getElementById('newProtein').value = '70';
        document.getElementById('newFats').value = '5';
        document.getElementById('newCarbs').value = '10';
    }
    
    function refreshData() { loadProducts(); }
    
    // НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ
    document.getElementById('adminToggleBtn').onclick = toggleAdminPanel;
    document.getElementById('loginBtn').onclick = loginAdmin;
    document.getElementById('addBtn').onclick = showAddForm;
    document.getElementById('refreshBtn').onclick = refreshData;
    document.getElementById('saveProductBtn').onclick = addProduct;
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('categoryFilter').onchange = filterData;
    document.getElementById('typeFilter').onchange = filterData;
    document.getElementById('brandFilter').onchange = filterData;
    
    window.onclick = function(event) {
        if (event.target === document.getElementById('addModal')) closeModal();
    };
    // ==================== ЭКСПОРТ В EXCEL ====================
function exportToExcel() {
    if (allProducts.length === 0) {
        alert("Нет данных для экспорта");
        return;
    }
    
    let csv = "\uFEFFНазвание;Категория;Тип;Бренд;Вес(г);Цена(₽);Белки(г);Жиры(г);Углеводы(г);Рейтинг\n";
    
    allProducts.forEach(p => {
        csv += `${p.name};${p.category};${p.type};${p.brand};${p.weight};${p.price};${p.protein};${p.fats};${p.carbs};${p.rating}\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `sportnutrition_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link);
    alert("✅ Данные выгружены в CSV");
}

// ==================== ИМПОРТ ИЗ EXCEL ====================
function importFromExcel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.csv';
    input.onchange = async function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async function(event) {
            const csv = event.target.result;
            const lines = csv.split('\n');
            
            let newProducts = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(';');
                if (cols.length >= 9 && cols[0].trim()) {
                    newProducts.push({
                        name: cols[0].trim(),
                        category: cols[1].trim() || "Протеины",
                        type: cols[2].trim() || "Не указан",
                        brand: cols[3].trim() || "Не указан",
                        weight: parseInt(cols[4]) || 0,
                        price: parseInt(cols[5]) || 0,
                        protein: parseFloat(cols[6]) || 0,
                        fats: parseFloat(cols[7]) || 0,
                        carbs: parseFloat(cols[8]) || 0,
                        rating: parseInt(cols[9]) || 5
                    });
                }
            }
            
            if (newProducts.length === 0) {
                alert("Файл не содержит данных");
                return;
            }
            
            for (const product of newProducts) {
                await supabaseClient.from('products').insert([product]);
            }
            
            alert(`✅ Импортировано ${newProducts.length} продуктов!`);
            loadProducts();
        };
        reader.readAsText(file, 'UTF-8');
    };
    input.click();
}

// НАЗНАЧЕНИЕ КНОПОК
document.getElementById('exportExcelBtn').onclick = exportToExcel;
document.getElementById('importExcelBtn').onclick = importFromExcel;
    
    // ЗАПУСК
    loadProducts();
</script>
</body>
</html>
