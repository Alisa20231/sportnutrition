<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; position: relative; }
        .header h1 { font-size: 1.8em; }
        .admin-panel { position: absolute; top: 20px; right: 20px; }
        .admin-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        .admin-form { background: white; padding: 20px; border-radius: 12px; margin-top: 10px; display: none; position: absolute; right: 0; width: 280px; }
        .admin-form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .admin-form button { background: #667eea; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
        .content { padding: 30px; }
        .selector-group { margin-bottom: 20px; }
        .selector-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .selector-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #667eea; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f5f5; }
        .status-bar { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; justify-content: space-between; }
        .product-count { background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; }
        .actions { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 3px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 6px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
        <div class="admin-panel">
            <button class="admin-toggle" onclick="toggleAdminPanel()">🔒 Админ-панель</button>
            <div class="admin-form" id="adminForm">
                <h3>🔐 Вход для администратора</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button onclick="loginAdmin()">Войти</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="selector-group">
            <label>📁 Выберите категорию:</label>
            <select id="categoryFilter" onchange="filterData()">
                <option value="">Все категории</option>
                <option value="Протеины">🥛 Протеины</option>
                <option value="Креатин">⚡ Креатин</option>
                <option value="Аминокислоты">🔗 Аминокислоты</option>
            </select>
        </div>
        
        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead id="tableHeaders">
                    <tr><th>Название</th><th>Категория</th><th>Тип</th><th>Бренд</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белок</th><th>Действия</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="status-bar">
            <span id="statusText">🔄 Загрузка данных...</span>
            <div class="product-count" id="productCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="showAddForm()">➕ Добавить продукт</button>
            <button class="btn" onclick="loadProducts()">🔄 Обновить</button>
        </div>
    </div>
</div>

<div id="addModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:white; padding:30px; border-radius:15px; width:400px; max-width:90%;">
        <h3 style="margin-bottom:20px;">➕ Новый продукт</h3>
        <input type="text" id="newName" placeholder="Название" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <select id="newCategory" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
            <option value="Протеины">Протеины</option>
            <option value="Креатин">Креатин</option>
            <option value="Аминокислоты">Аминокислоты</option>
        </select>
        <input type="text" id="newType" placeholder="Тип (Сывороточный)" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <input type="text" id="newBrand" placeholder="Бренд (MyProtein)" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <input type="number" id="newWeight" placeholder="Вес (г)" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <input type="number" id="newPrice" placeholder="Цена (₽)" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <input type="number" id="newProtein" placeholder="Белок (г)" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="addProduct()" style="flex:1; background:#667eea; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">Сохранить</button>
            <button onclick="closeModal()" style="flex:1; background:#ef4444; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ==================== ПОДСТАВЬТЕ ВАШИ ДАННЫЕ ИЗ SUPABASE ====================
    const SUPABASE_URL = "https://ВАШ_ПРОЕКТ.supabase.co";
    const SUPABASE_ANON_KEY = "ВАШ_АНОН_КЛЮЧ";
    
    let supabase;
    let isAdmin = false;
    
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
        document.getElementById('statusText').innerHTML = '❌ Ошибка подключения к Supabase';
    }
    
    async function loadProducts() {
        if (!supabase) return;
        
        document.getElementById('statusText').innerHTML = '🔄 Загрузка...';
        const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
        
        if (error) {
            document.getElementById('statusText').innerHTML = '❌ Ошибка: ' + error.message;
        } else {
            displayProducts(data);
            document.getElementById('statusText').innerHTML = `✅ Загружено ${data.length} продуктов`;
            document.getElementById('productCount').textContent = data.length;
        }
    }
    
    function displayProducts(products) {
        const category = document.getElementById('categoryFilter').value;
        let filtered = products;
        if (category) filtered = products.filter(p => p.category === category);
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        filtered.forEach(product => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${product.name || ''}</td>
                <td>${product.category || ''}</td>
                <td>${product.type || ''}</td>
                <td>${product.brand || ''}</td>
                <td>${product.weight || ''}</td>
                <td>${product.price || ''}</td>
                <td>${product.protein || ''}</td>
                <td>${isAdmin ? `<button class="edit-btn" onclick="editProduct(${product.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️</button>` : ''}</td>
            `;
        });
    }
    
    function filterData() {
        loadProducts();
    }
    
    function toggleAdminPanel() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }
    
    function loginAdmin() {
        const password = document.getElementById('adminPassword').value;
        if (password === "admin123") {
            isAdmin = true;
            alert("✅ Вы вошли как администратор");
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('addBtn').style.display = 'inline-block';
            loadProducts();
        } else {
            alert("❌ Неверный пароль");
        }
    }
    
    function showAddForm() {
        document.getElementById('addModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
    }
    
    async function addProduct() {
        if (!isAdmin) return;
        
        const product = {
            name: document.getElementById('newName').value,
            category: document.getElementById('newCategory').value,
            type: document.getElementById('newType').value,
            brand: document.getElementById('newBrand').value,
            weight: parseInt(document.getElementById('newWeight').value),
            price: parseInt(document.getElementById('newPrice').value),
            protein: parseInt(document.getElementById('newProtein').value)
        };
        
        if (!product.name) {
            alert("Введите название продукта");
            return;
        }
        
        const { error } = await supabase.from('products').insert([product]);
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            alert("✅ Продукт добавлен!");
            closeModal();
            loadProducts();
            document.getElementById('newName').value = '';
            document.getElementById('newType').value = '';
            document.getElementById('newBrand').value = '';
            document.getElementById('newWeight').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newProtein').value = '';
        }
    }
    
    async function deleteProduct(id) {
        if (!isAdmin) return;
        if (!confirm("Удалить продукт?")) return;
        
        const { error } = await supabase.from('products').delete().eq('id', id);
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            alert("✅ Продукт удалён");
            loadProducts();
        }
    }
    
    async function editProduct(id) {
        if (!isAdmin) return;
        const newName = prompt("Новое название:");
        if (!newName) return;
        
        const { error } = await supabase.from('products').update({ name: newName }).eq('id', id);
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            alert("✅ Изменено");
            loadProducts();
        }
    }
    
    loadProducts();
</script>
</body>
</html>
