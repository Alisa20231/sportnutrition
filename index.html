<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортивное питание | Общая база данных</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; text-align: center; position: relative; }
        .header h1 { font-size: 1.5em; }
        .admin-panel { position: absolute; top: 15px; right: 20px; }
        .admin-toggle { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        .admin-toggle:hover { background: rgba(255,255,255,0.3); }
        .admin-form { background: white; padding: 20px; border-radius: 12px; margin-top: 10px; display: none; position: absolute; right: 0; width: 280px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .admin-form input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .admin-form button { background: #667eea; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
        .content { padding: 25px; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select { flex: 1; min-width: 150px; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #667eea; color: white; padding: 12px 8px; text-align: left; }
        td { padding: 10px 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f5f5; }
        .status-bar { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .product-count { background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; font-weight: 600; }
        .actions { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { transform: translateY(-2px); background: #5a67d8; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { transform: translateY(-2px); background: #059669; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 3px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        @media (max-width: 768px) { th, td { font-size: 11px; padding: 6px; } .filter-bar select { font-size: 12px; } .btn { padding: 8px 16px; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .modal-buttons button:first-child { background: #667eea; color: white; }
        .modal-buttons button:last-child { background: #ef4444; color: white; }
        .rating { color: #f59e0b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏋️‍♂️ БАЗА ДАННЫХ СПОРТИВНОГО ПИТАНИЯ</h1>
        <div class="admin-panel">
            <button class="admin-toggle" id="adminToggleBtn">🔒 Админ-панель</button>
            <div class="admin-form" id="adminForm">
                <h3>🔐 Вход для администратора</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button id="loginBtn">Войти</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="filter-bar">
            <select id="categoryFilter">
                <option value="">📁 Все категории</option>
                <option value="Протеины">🥛 Протеины</option>
                <option value="Креатин">⚡ Креатин</option>
                <option value="Аминокислоты">🔗 Аминокислоты</option>
                <option value="Жиросжигатели">🔥 Жиросжигатели</option>
                <option value="Гейнеры">⚖️ Гейнеры</option>
            </select>
            <select id="typeFilter">
                <option value="">📋 Все типы</option>
            </select>
            <select id="brandFilter">
                <option value="">🏷️ Все бренды</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead id="tableHeaders">
                    <tr><th>Название</th><th>Категория</th><th>Тип</th><th>Бренд</th><th>Вес(г)</th><th>Цена(₽)</th><th>Белки</th><th>Жиры</th><th>Углеводы</th><th>Рейтинг</th><th>Действия</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" style="text-align:center; padding:40px;">🔄 Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="status-bar">
            <span id="statusText">Загрузка...</span>
            <div class="product-count" id="productCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="addBtn" style="display:none;">➕ Добавить продукт</button>
            <button class="btn btn-success" id="refreshBtn">🔄 Обновить</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ ДОБАВИТЬ НОВЫЙ ПРОДУКТ</h3>
        <input type="text" id="newName" placeholder="Название продукта *">
        <select id="newCategory">
            <option value="Протеины">🥛 Протеины</option>
            <option value="Креатин">⚡ Креатин</option>
            <option value="Аминокислоты">🔗 Аминокислоты</option>
            <option value="Жиросжигатели">🔥 Жиросжигатели</option>
            <option value="Гейнеры">⚖️ Гейнеры</option>
        </select>
        <input type="text" id="newType" placeholder="Тип (Сывороточный, Моногидрат...)">
        <input type="text" id="newBrand" placeholder="Бренд">
        <div class="form-row">
            <input type="number" id="newWeight" placeholder="Вес (г)">
            <input type="number" id="newPrice" placeholder="Цена (₽)">
        </div>
        <div class="form-row">
            <input type="number" step="0.1" id="newProtein" placeholder="Белки /100г">
            <input type="number" step="0.1" id="newFats" placeholder="Жиры /100г">
            <input type="number" step="0.1" id="newCarbs" placeholder="Углеводы /100г">
        </div>
        <select id="newRating">
            <option value="5">⭐⭐⭐⭐⭐ Отлично</option>
            <option value="4">⭐⭐⭐⭐ Хорошо</option>
            <option value="3">⭐⭐⭐ Средне</option>
            <option value="2">⭐⭐ Плохо</option>
            <option value="1">⭐ Ужасно</option>
        </select>
        <div class="modal-buttons">
            <button id="saveProductBtn">💾 СОХРАНИТЬ</button>
            <button id="closeModalBtn">❌ ОТМЕНА</button>
        </div>
    </div>
</div>

<script>

    const SUPABASE_URL = "https://gfegddnmqtwamxlmxqba.supabase.co";   
    const SUPABASE_ANON_KEY = "sb_publishable_BQm4AqGZgqOQ5WLe26UR-g_BtES9KtI";           
    
    let supabase;
    let isAdmin = false;
    let allProducts = [];
    
    // ПОДКЛЮЧЕНИЕ К SUPABASE
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Supabase подключен");
    } catch(e) {
        console.log("❌ Ошибка подключения:", e);
        document.getElementById('statusText').innerHTML = '❌ Ошибка подключения к Supabase';
    }
    
    // ЗАГРУЗКА ДАННЫХ
    async function loadProducts() {
        if (!supabase) return;
        
        document.getElementById('statusText').innerHTML = '🔄 Загрузка из Supabase...';
        
        const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
        
        if (error) {
            console.log("❌ Ошибка Supabase:", error);
            document.getElementById('statusText').innerHTML = '❌ Ошибка: ' + error.message;
            // Пробуем загрузить из localStorage
            loadFromLocal();
        } else {
            console.log("✅ Загружено из Supabase:", data.length);
            allProducts = data;
            updateFilters();
            displayProducts(allProducts);
            document.getElementById('statusText').innerHTML = `✅ Загружено ${data.length} продуктов из Supabase`;
            document.getElementById('productCount').textContent = data.length;
        }
    }
    
    // РЕЗЕРВНОЕ ХРАНИЛИЩЕ
    function loadFromLocal() {
        const saved = localStorage.getItem('sportnutrition_products');
        if (saved) {
            allProducts = JSON.parse(saved);
            updateFilters();
            displayProducts(allProducts);
            document.getElementById('statusText').innerHTML = `📀 Загружено ${allProducts.length} продуктов (локально)`;
            document.getElementById('productCount').textContent = allProducts.length;
        } else {
            allProducts = [];
            displayProducts([]);
            document.getElementById('statusText').innerHTML = '📭 Нет данных. Добавьте первый продукт.';
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('sportnutrition_products', JSON.stringify(allProducts));
    }
    
    // ОТОБРАЖЕНИЕ ТАБЛИЦЫ
    function displayProducts(products) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (!products || products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:40px;">📭 Нет продуктов. Администратор может добавить.</td></tr>';
            return;
        }
        
        products.forEach(product => {
            const ratingStars = '⭐'.repeat(product.rating || 5);
            const actions = isAdmin ? `<button class="edit-btn" onclick="editProduct(${product.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️</button>` : '';
            tbody.innerHTML += `
                <tr>
                    <td>${product.name || ''}</td>
                    <td>${product.category || ''}</td>
                    <td>${product.type || ''}</td>
                    <td>${product.brand || ''}</td>
                    <td>${product.weight || ''}</td>
                    <td>${product.price || ''}</td>
                    <td>${product.protein || 0} г</td>
                    <td>${product.fats || 0} г</td>
                    <td>${product.carbs || 0} г</td>
                    <td class="rating">${ratingStars}</td>
                    <td>${actions}</td>
                </tr>
            `;
        });
    }
    
    // ФИЛЬТРАЦИЯ
    function filterData() {
        const category = document.getElementById('categoryFilter').value;
        const type = document.getElementById('typeFilter').value;
        const brand = document.getElementById('brandFilter').value;
        
        let filtered = allProducts;
        if (category) filtered = filtered.filter(p => p.category === category);
        if (type) filtered = filtered.filter(p => p.type === type);
        if (brand) filtered = filtered.filter(p => p.brand === brand);
        
        displayProducts(filtered);
        document.getElementById('productCount').textContent = filtered.length;
    }
    
    function updateFilters() {
        const types = new Set();
        const brands = new Set();
        
        allProducts.forEach(p => {
            if (p.type) types.add(p.type);
            if (p.brand) brands.add(p.brand);
        });
        
        const typeSelect = document.getElementById('typeFilter');
        typeSelect.innerHTML = '<option value="">📋 Все типы</option>';
        Array.from(types).sort().forEach(t => {
            typeSelect.innerHTML += `<option value="${t}">${t}</option>`;
        });
        
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">🏷️ Все бренды</option>';
        Array.from(brands).sort().forEach(b => {
            brandSelect.innerHTML += `<option value="${b}">${b}</option>`;
        });
    }
    
    // АДМИН-ПАНЕЛЬ
    function toggleAdminPanel() {
        const form = document.getElementById('adminForm');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }
    
    function loginAdmin() {
        const password = document.getElementById('adminPassword').value;
        if (password === "admin123") {
            isAdmin = true;
            alert("✅ Вы вошли как администратор");
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('addBtn').style.display = 'inline-block';
            document.getElementById('adminPassword').value = '';
            filterData();
            document.getElementById('statusText').innerHTML = "Режим администратора активен";
        } else {
            alert("❌ Неверный пароль");
            document.getElementById('adminPassword').value = '';
        }
    }
    
    // ДОБАВЛЕНИЕ В SUPABASE
    async function addProductToSupabase(product) {
        if (!supabase) return false;
        const { data, error } = await supabase.from('products').insert([product]).select();
        if (error) {
            console.log("❌ Ошибка добавления:", error);
            return false;
        }
        return true;
    }
    
    async function addProduct() {
        if (!isAdmin) {
            alert("❌ Только администратор");
            return;
        }
        
        const name = document.getElementById('newName').value.trim();
        if (!name) {
            alert("Введите название продукта");
            return;
        }
        
        const newProduct = {
            name: name,
            category: document.getElementById('newCategory').value,
            type: document.getElementById('newType').value.trim(),
            brand: document.getElementById('newBrand').value.trim(),
            weight: parseInt(document.getElementById('newWeight').value) || 0,
            price: parseInt(document.getElementById('newPrice').value) || 0,
            protein: parseFloat(document.getElementById('newProtein').value) || 0,
            fats: parseFloat(document.getElementById('newFats').value) || 0,
            carbs: parseFloat(document.getElementById('newCarbs').value) || 0,
            rating: parseInt(document.getElementById('newRating').value)
        };
        
        const success = await addProductToSupabase(newProduct);
        
        if (success) {
            alert("✅ Продукт добавлен в Supabase!");
            closeModal();
            loadProducts(); // перезагружаем из Supabase
            clearForm();
        } else {
            // Если Supabase не работает, сохраняем локально
            newProduct.id = Date.now();
            allProducts.push(newProduct);
            saveToLocal();
            closeModal();
            filterData();
            updateFilters();
            alert("✅ Продукт сохранён локально");
        }
    }
    
    function clearForm() {
        document.getElementById('newName').value = '';
        document.getElementById('newType').value = '';
        document.getElementById('newBrand').value = '';
        document.getElementById('newWeight').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newProtein').value = '';
        document.getElementById('newFats').value = '';
        document.getElementById('newCarbs').value = '';
    }
    
    // РЕДАКТИРОВАНИЕ
    function editProduct(id) {
        if (!isAdmin) return;
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        
        const newName = prompt("Новое название:", product.name);
        if (newName && newName !== product.name) {
            product.name = newName;
            if (supabase) {
                supabase.from('products').update({ name: newName }).eq('id', id).then(() => loadProducts());
            } else {
                saveToLocal();
                filterData();
            }
        }
    }
    
    // УДАЛЕНИЕ
    function deleteProduct(id) {
        if (!isAdmin) return;
        if (!confirm("❓ Удалить этот продукт?")) return;
        
        if (supabase) {
            supabase.from('products').delete().eq('id', id).then(() => loadProducts());
        } else {
            const index = allProducts.findIndex(p => p.id === id);
            if (index !== -1) {
                allProducts.splice(index, 1);
                saveToLocal();
                filterData();
                updateFilters();
            }
        }
        alert("✅ Продукт удалён");
    }
    
    function showAddForm() {
        document.getElementById('addModal').style.display = 'flex';
        clearForm();
    }
    
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
    }
    
    function refreshData() {
        if (supabase) {
            loadProducts();
        } else {
            loadFromLocal();
        }
    }
    
    // НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ
    function initEventListeners() {
        document.getElementById('adminToggleBtn').addEventListener('click', toggleAdminPanel);
        document.getElementById('loginBtn').addEventListener('click', loginAdmin);
        document.getElementById('addBtn').addEventListener('click', showAddForm);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        document.getElementById('saveProductBtn').addEventListener('click', addProduct);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('categoryFilter').addEventListener('change', filterData);
        document.getElementById('typeFilter').addEventListener('change', filterData);
        document.getElementById('brandFilter').addEventListener('change', filterData);
        
        window.addEventListener('click', (event) => {
            if (event.target === document.getElementById('addModal')) closeModal();
        });
    }
    
    // ЗАПУСК
    document.addEventListener('DOMContentLoaded', function() {
        initEventListeners();
        if (supabase) {
            loadProducts();
        } else {
            loadFromLocal();
            document.getElementById('statusText').innerHTML = '⚠️ Supabase не настроен, данные локально';
        }
    });
</script>
</body>
</html>
